  // 2. 动态渲染表格数据
  // ==========================================
  const tbody = document.getElementById('all');
  let html = '';

  let group_count = 1;
  let last_cat_rank_type = '';

  rawData.forEach((line) => {
    let [cat, rank, type, abbr, name, pub, colorCode] = line.split('|');
    
    // 动态生成基于分组的序号
    let current_group = cat + rank + type;
    if(current_group !== last_cat_rank_type) {
        group_count = 1;
        last_cat_rank_type = current_group;
    }

    // 根据末尾的颜色标识位附加 CSS 类
    let trClass = '';
    if(colorCode === 'y') trClass = 'bg-yellow';
    else if(colorCode === 'r') trClass = 'txt-red';
    else if(colorCode === 'c') trClass = 'bg-cyan';
    else if(colorCode === 'g') trClass = 'txt-green';
    else if(colorCode === 's') trClass = 'txt-strike';

    html += `<tr class="${trClass}" data-cat="${cat}" data-rank="${rank}" data-type="${type}">
      <td>${cat}</td><td>${rank}</td><td>${type}</td><td>${group_count}</td>
      <td>${abbr === '-' ? '' : abbr}</td><td>${name}</td><td>${pub}</td>
    </tr>`;
    
    group_count++;
  });

  tbody.innerHTML = html;

  // ==========================================
  // 3. 多维度即时筛选引擎 (完美修复版)
  // ==========================================
  const activeFilters = { cat: '全部', rank: '全部', type: '全部' };
  let prevActiveCells = { cat: null, rank: null, type: null };

  function initFilters() {
    // 方向 (cat)
    document.querySelectorAll('#subj td').forEach(td => {
      if(td.textContent === '全部') { td.classList.add('highlight'); prevActiveCells.cat = td; }
      td.addEventListener('click', function() {
        if(prevActiveCells.cat) prevActiveCells.cat.classList.remove('highlight');
        this.classList.add('highlight');
        prevActiveCells.cat = this;
        activeFilters.cat = this.textContent;
        applyFilters();
      });
    });

    // 级别 (rank)
    document.querySelectorAll('#rank td').forEach(td => {
      if(td.textContent === '全部') { td.classList.add('highlight'); prevActiveCells.rank = td; }
      td.addEventListener('click', function() {
        if(prevActiveCells.rank) prevActiveCells.rank.classList.remove('highlight');
        this.classList.add('highlight');
        prevActiveCells.rank = this;
        activeFilters.rank = this.textContent;
        applyFilters();
      });
    });

    // 类型 (type)
    document.querySelectorAll('#kind td').forEach(td => {
      if(td.textContent === '全部') { td.classList.add('highlight'); prevActiveCells.type = td; }
      td.addEventListener('click', function() {
        if(prevActiveCells.type) prevActiveCells.type.classList.remove('highlight');
        this.classList.add('highlight');
        prevActiveCells.type = this;
        activeFilters.type = this.textContent;
        applyFilters();
      });
    });
  }

  function applyFilters() {
    let visibleCount = 0;
    const rows = document.querySelectorAll('#all tr');
    
    rows.forEach(row => {
      let rCat = row.getAttribute('data-cat');
      let rRank = row.getAttribute('data-rank');
      let rType = row.getAttribute('data-type');

      // 匹配逻辑
      let matchCat = (activeFilters.cat === '全部' || rCat === activeFilters.cat);
      let matchRank = (activeFilters.rank === '全部' || rRank === activeFilters.rank);
      let matchType = (activeFilters.type === '全部' || rType === activeFilters.type);

      if (matchCat && matchRank && matchType) {
        row.classList.remove('hide');
        visibleCount++;
        
        // 渲染斑马线，但安全排除有特定背景色的行
        if (!row.classList.contains('bg-yellow') && 
            !row.classList.contains('bg-cyan') && 
            !row.classList.contains('txt-red') && 
            !row.classList.contains('txt-green')) {
            
          if (visibleCount % 2 === 0) {
            row.classList.add('row-even');
          } else {
            row.classList.remove('row-even');
          }
        }
      } else {
        row.classList.add('hide');
      }
    });
  }

  // 页面加载完成后初始化
  window.onload = function() {
    initFilters();
    applyFilters();
  };
</script>

</body>
</html>
